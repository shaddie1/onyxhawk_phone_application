<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#c9a227">
  <meta name="description" content="Book professional cleaning services in Nairobi — residential, commercial, deep cleaning and more.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Onyxhawk">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Open Graph / WhatsApp preview -->
  <meta property="og:title" content="Onyxhawk Cleaning Service">
  <meta property="og:description" content="Spotless Spaces. Every Time. Book professional cleaning in Nairobi.">
  <meta property="og:image" content="icons/icon-512.png">
  <meta property="og:type" content="website">

  <title>Onyxhawk Cleaning Service</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/svg+xml" href="icon.svg">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #0c0c0c; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    body { color: #f0f0f0; }
    #app { height: 100dvh; height: 100vh; max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; position: relative; overflow: hidden; }
    .content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
    .content.chat-mode { display: flex; flex-direction: column; overflow: hidden; }
    .bottom-nav { flex-shrink: 0; height: 72px; background: #111; border-top: 1px solid #2c2c2c; display: flex; padding-bottom: env(safe-area-inset-bottom); }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border: none; background: none; cursor: pointer; font-size: 9px; font-family: inherit; transition: opacity 0.15s; }
    .nav-btn:active { opacity: 0.7; }
    input, textarea, button { font-family: inherit; }
    input::placeholder, textarea::placeholder { color: #555; }
    input[type="date"] { color-scheme: dark; }
    textarea { resize: none; }
    ::-webkit-scrollbar { display: none; }
    .ox-btn { border: none; cursor: pointer; transition: transform 0.1s; }
    .ox-btn:active { transform: scale(0.97); }
    @keyframes dotpulse { 0%,80%,100%{transform:scale(0.5);opacity:0.4} 40%{transform:scale(1);opacity:1} }
    @keyframes fadeup { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg-bubble { animation: fadeup 0.2s ease; }
    .svc-card { transition: border-color 0.2s; }
    .svc-card:hover { border-color: #c9a227 !important; }

    /* Desktop centering decoration */
    @media (min-width: 480px) {
      body { background: #080808; }
      #app { box-shadow: 0 0 60px rgba(0,0,0,0.8); }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
/* ═══════════════════════════════════════════════════
   CONFIGURATION — Update these for your business
   ═══════════════════════════════════════════════════ */
const CONFIG = {
  businessName:  'Onyxhawk Cleaning Service',
  phone:         '+254 115247988',   // ← your WhatsApp/phone
  whatsapp:      '2547115247988',        // ← digits only for WhatsApp link
  website:       'https://shaddie1.github.io/onyxhawks-cleaning-service',
  nairobi:       true,
  ANTHROPIC_KEY: '',   // ← paste your Anthropic API key here for Hawk AI chat
                       //   get one at https://console.anthropic.com
};
/* ═══════════════════════════════════════════════════ */

const { useState, useRef, useEffect } = React;

const G = '#c9a227', GD = '#7a6010', BG = '#0c0c0c',
      CARD = '#181818', CARD2 = '#212121',
      TX = '#f0f0f0', MU = '#666', BO = '#2c2c2c', OK = '#4caf7d';

const SVCS = [
  { id:1, ic:'🏠', name:'Residential',       desc:'Homes & apartments',          price:'From KES 3,500' },
  { id:2, ic:'🏢', name:'Commercial',         desc:'Offices & workspaces',         price:'From KES 8,000' },
  { id:3, ic:'✨', name:'Deep Clean',          desc:'Top-to-bottom overhaul',       price:'From KES 6,500' },
  { id:4, ic:'🔨', name:'Post-Construction', desc:'Site cleanup & dust removal',  price:'From KES 12,000'},
  { id:5, ic:'🔄', name:'Maintenance',        desc:'Scheduled recurring cleans',   price:'From KES 2,800' },
  { id:6, ic:'📦', name:'Move In/Out',        desc:'Complete property preparation',price:'From KES 5,000' },
];

const TIMES = ['8:00 AM','9:00 AM','10:00 AM','11:00 AM','12:00 PM','2:00 PM','3:00 PM','4:00 PM'];

/* ─── Reusable styled input ─── */
const Inp = ({ placeholder, value, onChange, type='text', err=false, rows }) => {
  const s = {
    display:'block', width:'100%', padding:'12px 14px', marginBottom:10,
    background:CARD2, border:`1px solid ${err?'#e24b4a':BO}`,
    borderRadius:10, color:TX, fontSize:13, outline:'none',
  };
  return rows
    ? <textarea placeholder={placeholder} value={value} onChange={onChange} rows={rows} style={s}/>
    : <input type={type} placeholder={placeholder} value={value} onChange={onChange} style={type==='date'?{...s,color:value?TX:MU}:s}/>;
};

/* ─── Main App ─── */
function App() {
  const [screen, setScreen]   = useState('home');
  const [selSvc, setSelSvc]   = useState(null);
  const [form,   setForm]     = useState({ name:'', phone:'', email:'', date:'', time:'', location:'', notes:'' });
  const [errs,   setErrs]     = useState({});
  const [msgs,   setMsgs]     = useState([
    { r:'ai', t:"Hi! I'm Hawk AI — your Onyxhawk assistant. Ask me about services, pricing, or book a clean!" }
  ]);
  const [inp,     setInp]     = useState('');
  const [aiLoad,  setAiLoad]  = useState(false);
  const chatEnd  = useRef(null);
  const contentRef = useRef(null);

  useEffect(() => { chatEnd.current?.scrollIntoView({ behavior:'smooth' }); }, [msgs, aiLoad]);

  const go = (s) => {
    setScreen(s);
    if (s !== 'chat') setTimeout(() => contentRef.current?.scrollTo(0, 0), 50);
  };

  const bookSvc = (svc) => { setSelSvc(svc); go('book'); };

  const upd = (key, val) => {
    setForm(p => ({ ...p, [key]:val }));
    setErrs(p => ({ ...p, [key]:false }));
  };

  const validate = () => {
    const e = {};
    if (!form.name.trim())     e.name     = 1;
    if (!form.phone.trim())    e.phone    = 1;
    if (!form.date)            e.date     = 1;
    if (!form.time)            e.time     = 1;
    if (!form.location.trim()) e.location = 1;
    setErrs(e);
    return !Object.keys(e).length;
  };

  const submit = () => { if (selSvc && validate()) go('confirm'); };

  const sendMsg = async () => {
    if (!inp.trim() || aiLoad) return;
    const q = inp.trim(); setInp('');
    setMsgs(p => [...p, { r:'user', t:q }]);
    setAiLoad(true);

    if (!CONFIG.ANTHROPIC_KEY) {
      await new Promise(r => setTimeout(r, 700));
      const fallback = [
        `Thanks for asking! For pricing, our services start from KES 2,800 for Maintenance up to KES 12,000 for Post-Construction. Call us on ${CONFIG.phone} for a custom quote.`,
        `We serve Nairobi and surrounding areas including Westlands, Karen, Kilimani, Eastlands and more. Book via the app or call ${CONFIG.phone}.`,
        `You can book directly in the app — just tap the "Book" tab, select a service, choose your date & time, and we confirm within 30 minutes!`,
        `Our cleaners are vetted, insured, and use eco-friendly products. Satisfaction guaranteed — we reclean for free if you're not happy!`,
      ];
      setMsgs(p => [...p, { r:'ai', t: fallback[Math.floor(Math.random()*fallback.length)] }]);
      setAiLoad(false);
      return;
    }

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type':'application/json', 'x-api-key': CONFIG.ANTHROPIC_KEY, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514', max_tokens: 350,
          system: `You are Hawk AI for Onyxhawk Cleaning Service, Nairobi Kenya. Services & prices: Residential (KES 3,500+), Commercial (KES 8,000+), Deep Clean (KES 6,500+), Post-Construction (KES 12,000+), Maintenance (KES 2,800+), Move In/Out (KES 5,000+). Phone: ${CONFIG.phone}. Be brief (2-3 sentences), warm, professional. Encourage booking via the app.`,
          messages: [{ role:'user', content:q }]
        })
      });
      const d = await res.json();
      setMsgs(p => [...p, { r:'ai', t: d.content?.[0]?.text || 'Let me connect you with our team shortly!' }]);
    } catch {
      setMsgs(p => [...p, { r:'ai', t:`Having trouble connecting right now. Please call us on ${CONFIG.phone}.` }]);
    }
    setAiLoad(false);
  };

  /* ─── HOME ─── */
  const Home = () => (
    <div>
      <div style={{ padding:'32px 22px 22px', borderBottom:`1px solid ${BO}` }}>
        <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:16 }}>
          <div style={{ width:46, height:46, borderRadius:14, background:G, display:'flex', alignItems:'center', justifyContent:'center', fontSize:24, flexShrink:0 }}>🦅</div>
          <div>
            <div style={{ fontSize:20, fontWeight:800, color:TX, letterSpacing:-0.5 }}>
              Onyx<span style={{ color:G }}>hawk</span>
            </div>
            <div style={{ fontSize:9, color:MU, letterSpacing:2, textTransform:'uppercase' }}>Cleaning Service · Nairobi</div>
          </div>
        </div>
        <h1 style={{ fontSize:30, fontWeight:800, color:TX, lineHeight:1.15, marginBottom:10, letterSpacing:-0.5 }}>
          Spotless Spaces.<br/><span style={{ color:G }}>Every Time.</span>
        </h1>
        <p style={{ fontSize:13, color:MU, marginBottom:22, lineHeight:1.65 }}>
          Professional cleaning for homes, offices & commercial spaces in Nairobi and beyond.
        </p>
        <div style={{ display:'flex', gap:10 }}>
          <button className="ox-btn" onClick={() => go('book')} style={{ flex:2, padding:'14px', background:G, borderRadius:12, color:'#000', fontSize:14, fontWeight:700 }}>
            Book a Clean
          </button>
          <button className="ox-btn" onClick={() => go('services')} style={{ flex:1, padding:'14px', background:'transparent', border:`1px solid ${BO}`, borderRadius:12, color:TX, fontSize:14 }}>
            Services
          </button>
        </div>
      </div>

      {/* Stats */}
      <div style={{ display:'flex', padding:'14px 16px', gap:8, borderBottom:`1px solid ${BO}` }}>
        {[['200+','Clients'],['5K+','Cleans'],['4.9★','Rating'],['3','Counties']].map(([v,l]) => (
          <div key={l} style={{ flex:1, background:CARD, borderRadius:10, padding:'11px 6px', textAlign:'center' }}>
            <div style={{ fontSize:16, fontWeight:700, color:G }}>{v}</div>
            <div style={{ fontSize:9, color:MU, marginTop:2 }}>{l}</div>
          </div>
        ))}
      </div>

      {/* Services scroll */}
      <div style={{ padding:'18px 22px 6px' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
          <span style={{ fontSize:13, fontWeight:700, color:TX }}>Our Services</span>
          <span onClick={() => go('services')} style={{ fontSize:11, color:G, cursor:'pointer' }}>See all →</span>
        </div>
        <div style={{ display:'flex', gap:8, overflowX:'auto', paddingBottom:6 }}>
          {SVCS.map(s => (
            <div key={s.id} onClick={() => bookSvc(s)} style={{ flexShrink:0, width:106, background:CARD, border:`1px solid ${BO}`, borderRadius:12, padding:'13px 10px', cursor:'pointer' }}>
              <div style={{ fontSize:24, marginBottom:8 }}>{s.ic}</div>
              <div style={{ fontSize:11, fontWeight:600, color:TX, marginBottom:2 }}>{s.name}</div>
              <div style={{ fontSize:9, color:G }}>{s.price}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Why us */}
      <div style={{ padding:'12px 22px 8px' }}>
        {[['🛡️','Vetted & Insured','Background-checked, insured cleaners'],
          ['🌿','Eco-Friendly','Safe green cleaning products'],
          ['⏱️','Always On-Time','We respect your schedule'],
          ['⭐','Satisfaction Guarantee','We reclean if not 100% happy']
        ].map(([ic,t,s]) => (
          <div key={t} style={{ display:'flex', gap:12, alignItems:'center', padding:'10px 0', borderBottom:`1px solid ${BO}` }}>
            <div style={{ width:34, height:34, borderRadius:10, background:CARD, display:'flex', alignItems:'center', justifyContent:'center', fontSize:16, flexShrink:0 }}>{ic}</div>
            <div>
              <div style={{ fontSize:13, fontWeight:600, color:TX }}>{t}</div>
              <div style={{ fontSize:11, color:MU }}>{s}</div>
            </div>
          </div>
        ))}
      </div>

      {/* WhatsApp CTA */}
      <div style={{ margin:'16px 22px 10px', background:CARD, border:`1px solid #1a4a1a`, borderRadius:14, padding:'14px', display:'flex', alignItems:'center', gap:12 }}>
        <div style={{ fontSize:26 }}>💬</div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:13, fontWeight:700, color:TX }}>Chat on WhatsApp</div>
          <div style={{ fontSize:11, color:MU }}>Quick quotes & confirmations</div>
        </div>
        <a href={`https://wa.me/${CONFIG.whatsapp}?text=Hi%20Onyxhawk%2C%20I'd%20like%20to%20book%20a%20cleaning%20service`} target="_blank" rel="noopener" style={{ padding:'9px 14px', background:'#25d366', border:'none', borderRadius:9, color:'#fff', fontSize:12, fontWeight:700, textDecoration:'none', cursor:'pointer' }}>
          Chat
        </a>
      </div>

      {/* Promo */}
      <div style={{ margin:'0 22px 36px', background:'linear-gradient(135deg,#1a1200,#2a1e00)', border:`1px solid ${GD}`, borderRadius:14, padding:'16px' }}>
        <div style={{ fontSize:9, color:G, letterSpacing:2, textTransform:'uppercase', marginBottom:4 }}>Limited Offer</div>
        <div style={{ fontSize:16, fontWeight:700, color:TX, marginBottom:4 }}>First Clean — 15% Off</div>
        <div style={{ fontSize:12, color:MU, marginBottom:14 }}>Book your first service and save on the total cost.</div>
        <button className="ox-btn" onClick={() => go('book')} style={{ padding:'10px 18px', background:G, borderRadius:9, color:'#000', fontSize:12, fontWeight:700 }}>
          Claim Discount →
        </button>
      </div>
    </div>
  );

  /* ─── SERVICES ─── */
  const Services = () => (
    <div style={{ padding:'24px 22px' }}>
      <div style={{ fontSize:9, color:G, letterSpacing:2, textTransform:'uppercase', marginBottom:4 }}>What We Offer</div>
      <h2 style={{ fontSize:24, fontWeight:800, color:TX, marginBottom:18, letterSpacing:-0.3 }}>Our Services</h2>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
        {SVCS.map(s => (
          <div key={s.id} className="svc-card" onClick={() => bookSvc(s)}
            style={{ background:CARD, border:`1px solid ${BO}`, borderRadius:14, padding:'16px 12px', cursor:'pointer' }}>
            <div style={{ fontSize:28, marginBottom:10 }}>{s.ic}</div>
            <div style={{ fontSize:13, fontWeight:700, color:TX, marginBottom:4 }}>{s.name}</div>
            <div style={{ fontSize:11, color:MU, marginBottom:8, lineHeight:1.4 }}>{s.desc}</div>
            <div style={{ fontSize:12, color:G, fontWeight:600 }}>{s.price}</div>
          </div>
        ))}
      </div>
      <div style={{ marginTop:14, background:CARD, border:`1px solid ${BO}`, borderRadius:14, padding:'14px', display:'flex', alignItems:'center', gap:12 }}>
        <div style={{ width:38, height:38, borderRadius:19, background:`${G}22`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, flexShrink:0 }}>🤖</div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:13, fontWeight:600, color:TX }}>Not sure which service?</div>
          <div style={{ fontSize:11, color:MU }}>Ask Hawk AI for a recommendation</div>
        </div>
        <button className="ox-btn" onClick={() => go('chat')} style={{ padding:'9px 13px', background:G, borderRadius:9, color:'#000', fontSize:12, fontWeight:700 }}>Ask AI</button>
      </div>
    </div>
  );

  /* ─── BOOK ─── */
  const Book = () => (
    <div style={{ padding:'22px' }}>
      <button onClick={() => go('services')} style={{ background:'none', border:'none', color:MU, cursor:'pointer', padding:0, marginBottom:16, fontSize:13, display:'flex', alignItems:'center', gap:4 }}>
        ← Services
      </button>
      <div style={{ fontSize:9, color:G, letterSpacing:2, textTransform:'uppercase', marginBottom:4 }}>Schedule a Clean</div>
      <h2 style={{ fontSize:24, fontWeight:800, color:TX, marginBottom:20, letterSpacing:-0.3 }}>Book a Service</h2>

      <div style={{ fontSize:11, color:MU, textTransform:'uppercase', letterSpacing:1, marginBottom:8 }}>Select Service</div>
      <div style={{ display:'flex', flexDirection:'column', gap:6, marginBottom:20 }}>
        {SVCS.map(s => {
          const a = selSvc?.id === s.id;
          return (
            <div key={s.id} onClick={() => setSelSvc(s)} style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 13px', background:a?`${G}12`:CARD, border:`1px solid ${a?G:BO}`, borderRadius:10, cursor:'pointer' }}>
              <span style={{ fontSize:18 }}>{s.ic}</span>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:13, fontWeight:600, color:TX }}>{s.name}</div>
                <div style={{ fontSize:11, color:MU }}>{s.price}</div>
              </div>
              {a && <span style={{ color:G, fontSize:16 }}>✓</span>}
            </div>
          );
        })}
      </div>

      <div style={{ fontSize:11, color:MU, textTransform:'uppercase', letterSpacing:1, marginBottom:8 }}>Your Details</div>
      <Inp placeholder="Full Name"      value={form.name}  onChange={e=>upd('name',e.target.value)}  err={errs.name}/>
      <Inp placeholder="Phone Number"   value={form.phone} onChange={e=>upd('phone',e.target.value)} err={errs.phone} type="tel"/>
      <Inp placeholder="Email (optional)" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} type="email"/>

      <div style={{ fontSize:11, color:MU, textTransform:'uppercase', letterSpacing:1, marginBottom:8, marginTop:4 }}>When & Where</div>
      <Inp type="date" placeholder="" value={form.date} onChange={e=>upd('date',e.target.value)} err={errs.date}/>

      <div style={{ marginBottom:12 }}>
        <div style={{ fontSize:11, color:errs.time&&!form.time?'#e24b4a':MU, marginBottom:7 }}>Preferred Time</div>
        <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
          {TIMES.map(t => {
            const sel = form.time === t;
            return (
              <button key={t} className="ox-btn" onClick={() => { setForm(p=>({...p,time:t})); setErrs(p=>({...p,time:false})); }}
                style={{ padding:'8px 11px', fontSize:12, background:sel?G:CARD2, color:sel?'#000':TX, border:`1px solid ${errs.time&&!form.time?'#e24b4a':(sel?G:BO)}`, borderRadius:8, fontWeight:sel?700:400 }}>
                {t}
              </button>
            );
          })}
        </div>
      </div>

      <Inp placeholder="Address / Location" value={form.location} onChange={e=>upd('location',e.target.value)} err={errs.location} rows={2}/>
      <Inp placeholder="Additional notes (optional)" value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} rows={2}/>

      <button className="ox-btn" onClick={submit} style={{ width:'100%', padding:'15px', background:selSvc?G:CARD2, border:`1px solid ${selSvc?G:BO}`, borderRadius:12, color:selSvc?'#000':MU, fontSize:14, fontWeight:700, marginTop:8 }}>
        {selSvc ? `Book ${selSvc.name} →` : 'Select a Service First'}
      </button>
      <p style={{ textAlign:'center', fontSize:11, color:MU, marginTop:10, marginBottom:28 }}>We confirm within 30 minutes via WhatsApp</p>
    </div>
  );

  /* ─── CHAT ─── */
  const Chat = () => (
    <>
      <div style={{ padding:'14px 20px 12px', borderBottom:`1px solid ${BO}`, flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ width:40, height:40, borderRadius:20, background:G, display:'flex', alignItems:'center', justifyContent:'center', fontSize:20 }}>🤖</div>
          <div>
            <div style={{ fontSize:14, fontWeight:700, color:TX }}>Hawk AI</div>
            <div style={{ fontSize:10, display:'flex', alignItems:'center', gap:5, color:OK }}>
              <span style={{ width:5, height:5, borderRadius:'50%', background:OK, display:'inline-block' }}/>
              {CONFIG.ANTHROPIC_KEY ? 'Online · Powered by Claude' : 'Online · Smart Responses'}
            </div>
          </div>
        </div>
      </div>

      <div style={{ flex:1, overflowY:'auto', padding:'14px 14px 6px', WebkitOverflowScrolling:'touch' }}>
        {msgs.map((m, i) => (
          <div key={i} className="msg-bubble" style={{ display:'flex', justifyContent:m.r==='user'?'flex-end':'flex-start', marginBottom:10, alignItems:'flex-end', gap:7 }}>
            {m.r==='ai' && <div style={{ width:26, height:26, borderRadius:13, background:G, display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, flexShrink:0 }}>🤖</div>}
            <div style={{ maxWidth:'78%', padding:'10px 13px', borderRadius:m.r==='user'?'14px 14px 4px 14px':'4px 14px 14px 14px', background:m.r==='user'?G:CARD, color:m.r==='user'?'#000':TX, fontSize:13, lineHeight:1.55 }}>
              {m.t}
            </div>
          </div>
        ))}
        {aiLoad && (
          <div style={{ display:'flex', alignItems:'flex-end', gap:7, marginBottom:10 }}>
            <div style={{ width:26, height:26, borderRadius:13, background:G, display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, flexShrink:0 }}>🤖</div>
            <div style={{ background:CARD, padding:'12px 14px', borderRadius:'4px 14px 14px 14px', display:'flex', gap:5 }}>
              {[0,200,400].map(d => <span key={d} style={{ width:7, height:7, borderRadius:'50%', background:MU, display:'inline-block', animation:`dotpulse 1.2s ${d}ms infinite` }}/>)}
            </div>
          </div>
        )}
        <div ref={chatEnd}/>
      </div>

      <div style={{ flexShrink:0, padding:'5px 12px 4px', display:'flex', gap:6, overflowX:'auto' }}>
        {["What are your prices?","Do you serve Westlands?","Book a clean now"].map(q => (
          <button key={q} onClick={() => setInp(q)} style={{ flexShrink:0, padding:'6px 12px', background:CARD, border:`1px solid ${BO}`, borderRadius:20, color:TX, fontSize:10, cursor:'pointer', whiteSpace:'nowrap' }}>{q}</button>
        ))}
      </div>

      <div style={{ flexShrink:0, padding:'6px 12px 16px', paddingBottom:'calc(16px + env(safe-area-inset-bottom))', borderTop:`1px solid ${BO}`, display:'flex', gap:8, alignItems:'center' }}>
        <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendMsg()}
          placeholder="Ask Hawk AI..."
          style={{ flex:1, padding:'11px 14px', background:CARD2, border:`1px solid ${BO}`, borderRadius:24, color:TX, fontSize:13, outline:'none' }}/>
        <button className="ox-btn" onClick={sendMsg} disabled={aiLoad}
          style={{ width:42, height:42, borderRadius:21, background:aiLoad?GD:G, border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, flexShrink:0 }}>
          ↑
        </button>
      </div>
    </>
  );

  /* ─── CONFIRM ─── */
  const Confirm = () => (
    <div style={{ padding:'36px 24px', textAlign:'center' }}>
      <div style={{ width:72, height:72, borderRadius:36, background:`${OK}18`, border:`2px solid ${OK}`, display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 20px', fontSize:34 }}>✓</div>
      <h2 style={{ fontSize:24, fontWeight:800, color:TX, marginBottom:10 }}>Booking Sent!</h2>
      <p style={{ fontSize:13, color:MU, marginBottom:26, lineHeight:1.65 }}>
        We'll confirm your booking within 30 minutes via phone or WhatsApp. Thank you for choosing Onyxhawk!
      </p>

      <div style={{ background:CARD, border:`1px solid ${BO}`, borderRadius:14, padding:'16px', textAlign:'left', marginBottom:20 }}>
        <div style={{ fontSize:9, color:G, letterSpacing:2, textTransform:'uppercase', marginBottom:12 }}>Booking Summary</div>
        {[['Service',selSvc?.name],['Name',form.name],['Phone',form.phone],['Date',form.date],['Time',form.time],['Location',form.location]]
          .filter(([,v])=>v)
          .map(([l,v]) => (
            <div key={l} style={{ display:'flex', justifyContent:'space-between', padding:'7px 0', borderBottom:`1px solid ${BO}` }}>
              <span style={{ fontSize:12, color:MU }}>{l}</span>
              <span style={{ fontSize:12, color:TX, fontWeight:500, textAlign:'right', maxWidth:'62%' }}>{v}</span>
            </div>
          ))}
      </div>

      <a href={`https://wa.me/${CONFIG.whatsapp}?text=Hi%20Onyxhawk%2C%20I%20just%20booked%20${encodeURIComponent(selSvc?.name||'')}%20for%20${encodeURIComponent(form.date)}%20at%20${encodeURIComponent(form.time)}.%20My%20name%20is%20${encodeURIComponent(form.name)}.`}
        target="_blank" rel="noopener" style={{ display:'block', width:'100%', padding:'14px', background:'#25d366', borderRadius:12, color:'#fff', fontSize:14, fontWeight:700, textDecoration:'none', marginBottom:10 }}>
        💬 Confirm on WhatsApp
      </a>
      <button className="ox-btn" onClick={() => { go('home'); setForm({name:'',phone:'',email:'',date:'',time:'',location:'',notes:''}); setSelSvc(null); setErrs({}); }}
        style={{ width:'100%', padding:'14px', background:'transparent', border:`1px solid ${BO}`, borderRadius:12, color:TX, fontSize:14, cursor:'pointer' }}>
        Back to Home
      </button>
    </div>
  );

  /* ─── NAV ─── */
  const NAV = [
    { id:'home',     ic:'🏠', lb:'Home'     },
    { id:'services', ic:'🗂️', lb:'Services' },
    { id:'book',     ic:'📅', lb:'Book'     },
    { id:'chat',     ic:'🤖', lb:'Hawk AI'  },
  ];

  const isChat = screen === 'chat';
  const contentCls = 'content' + (isChat ? ' chat-mode' : '');

  return (
    <>
      <div className={contentCls} ref={contentRef}>
        {screen === 'home'     && <Home/>}
        {screen === 'services' && <Services/>}
        {screen === 'book'     && <Book/>}
        {screen === 'chat'     && <Chat/>}
        {screen === 'confirm'  && <Confirm/>}
      </div>

      {screen !== 'confirm' && (
        <nav className="bottom-nav">
          {NAV.map(({ id, ic, lb }) => {
            const active = screen === id;
            return (
              <button key={id} className="nav-btn" onClick={() => go(id)}
                style={{ color: active ? G : MU, fontWeight: active ? 700 : 400 }}>
                <span style={{ fontSize:24 }}>{ic}</span>
                <span>{lb}</span>
              </button>
            );
          })}
        </nav>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(r => console.log('SW registered:', r.scope))
      .catch(e => console.log('SW error:', e));
  });
}
</script>
</body>
</html>
