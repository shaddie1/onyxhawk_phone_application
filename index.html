<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#c9a227">
  <meta name="description" content="Book professional cleaning services in Nairobi — residential, commercial, deep cleaning and more.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Onyxhawk">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Open Graph / WhatsApp preview -->
  <meta property="og:title" content="Onyxhawk Cleaning Service">
  <meta property="og:description" content="Spotless Spaces. Every Time. Book professional cleaning in Nairobi.">
  <meta property="og:image" content="logo.jpg">
  <meta property="og:type" content="website">

  <title>Onyxhawk Cleaning Service</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="logo.jpg">
  <link rel="icon" type="image/jpeg" href="logo.jpg">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --BG: #0c0c0c; --CARD: #181818; --CARD2: #212121;
      --TX: #f0f0f0; --MU: #666; --BO: #2c2c2c; --nav-bg: #111;
    }
    body.light-mode {
      --BG: #f4f4f4; --CARD: #ffffff; --CARD2: #ebebeb;
      --TX: #111111; --MU: #888; --BO: #ddd; --nav-bg: #ffffff;
    }
    html, body { height: 100%; overflow: hidden; background: var(--BG); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    body { color: var(--TX); }
    #app { height: 100dvh; height: 100vh; max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; position: relative; overflow: hidden; }
    .content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
    .content.chat-mode { display: flex; flex-direction: column; overflow: hidden; }
    .bottom-nav { flex-shrink: 0; height: 72px; background: var(--nav-bg); border-top: 1px solid var(--BO); display: flex; padding-bottom: env(safe-area-inset-bottom); }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border: none; background: none; cursor: pointer; font-size: 9px; font-family: inherit; transition: opacity 0.15s; }
    .nav-btn:active { opacity: 0.7; }
    input, textarea, button { font-family: inherit; }
    input::placeholder, textarea::placeholder { color: #555; }
    body.light-mode input::placeholder, body.light-mode textarea::placeholder { color: #aaa; }
    input[type="date"] { color-scheme: dark; }
    body.light-mode input[type="date"] { color-scheme: light; }
    textarea { resize: none; }
    ::-webkit-scrollbar { display: none; }
    .ox-btn { border: none; cursor: pointer; transition: transform 0.1s; }
    .ox-btn:active { transform: scale(0.97); }
    @keyframes dotpulse { 0%,80%,100%{transform:scale(0.5);opacity:0.4} 40%{transform:scale(1);opacity:1} }
    @keyframes fadeup { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg-bubble { animation: fadeup 0.2s ease; }
    .svc-card { transition: border-color 0.2s; }
    .svc-card:hover { border-color: #c9a227 !important; }
    @keyframes bgpulse { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
    @keyframes glowpulse { 0%,100%{opacity:0.18} 50%{opacity:0.32} }

    /* Desktop centering decoration */
    @media (min-width: 480px) {
      body { background: var(--BG); }
      #app { box-shadow: 0 0 60px rgba(0,0,0,0.8); }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
/* ═══════════════════════════════════════════════════
   CONFIGURATION — Update these for your business

const ADS = [
  { ic:'✨', title:'Deep Clean Special',    desc:'From KES 6,500 — Top-to-bottom overhaul',  badge:'Popular'    },
  { ic:'🏠', title:'Residential Cleaning',  desc:'From KES 3,500 — Homes & apartments',      badge:'Book Now'   },
  { ic:'🏢', title:'Office Cleaning',       desc:'From KES 8,000 — Offices & workspaces',    badge:'Commercial' },
  { ic:'🔄', title:'Maintenance Plan',      desc:'From KES 2,800 — Recurring schedule',       badge:'Save More'  },
  { ic:'📦', title:'Move In/Out Clean',     desc:'From KES 5,000 — Complete property prep',  badge:'New Home?'  },
  { ic:'🌿', title:'Eco-Friendly Cleaning', desc:'Safe for kids, pets & the environment',    badge:'Green'      },

const SVC_POINTS = { 1:350, 2:800, 3:650, 4:1200, 5:280, 6:500 };

const formatKES = (amount) => amount ? new Intl.NumberFormat('en-KE').format(amount) : '0';

const REWARDS = [
  { id:1, pts:500,   label:'KES 250 Discount',      desc:'Off your next booking',         ic:'💰' },
  { id:2, pts:1000,  label:'KES 500 Discount',       desc:'Off your next booking',         ic:'💳' },
  { id:3, pts:2000,  label:'KES 1,000 Discount',     desc:'Off your next booking',         ic:'🎁' },
  { id:4, pts:5000,  label:'Free Residential Clean',  desc:'Full service, completely free', ic:'🏠' },
  { id:5, pts:8000,  label:'Free Deep Clean',         desc:'Top-to-bottom, on us',          ic:'✨' },
  { id:6, pts:12000, label:'Free Commercial Clean',   desc:'Full commercial service free',  ic:'🏢' },
];

/* ─── Step progress bar ─── */
const StepBar = ({ step }) => (
  <div style={{ display:'flex', alignItems:'center', padding:'18px 24px 6px' }}>
    {[['Book',1],['Review',2],['Pay',3]].map(([label, n], i, arr) => (
      <React.Fragment key={n}>
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:3 }}>
          <div style={{ width:26, height:26, borderRadius:13, background:step>=n?G:CARD2, border:`2px solid ${step>=n?G:BO}`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, fontWeight:800, color:step>=n?'#000':MU, transition:'all 0.2s' }}>
            {step > n ? '✓' : n}
          </div>
          <div style={{ fontSize:9, color:step===n?G:step>n?G:MU, fontWeight:step===n?700:400, letterSpacing:0.5 }}>{label.toUpperCase()}</div>
        </div>
        {i < arr.length - 1 && (
          <div style={{ flex:1, height:2, background:step>i+1?G:BO, margin:'0 6px', marginBottom:14, transition:'background 0.3s' }}/>
        )}
      </React.Fragment>
    ))}
  </div>
);

/* ─── Reusable styled input ─── */
const Inp = ({ placeholder, value, onChange, type='text', err=false, rows }) => {
  const s = {
    display:'block', width:'100%', padding:'12px 14px', marginBottom:10,
    background:CARD2, border:`1px solid ${err?'#e24b4a':BO}`,
    borderRadius:10, color:TX, fontSize:13, outline:'none',
  };
  return rows
    ? <textarea placeholder={placeholder} value={value} onChange={onChange} rows={rows} style={s}/>
    : <input type={type} placeholder={placeholder} value={value} onChange={onChange} style={type==='date'?{...s,color:value?TX:MU}:s}/>;
};

/* ─── LANDING SCREEN ─── */
function Landing({ go }) {
  const [adIdx, setAdIdx] = React.useState(0);
  React.useEffect(() => {
    const t = setInterval(() => setAdIdx(i => (i + 1) % ADS.length), 3500);
    return () => clearInterval(t);
  }, []);
  const ad = ADS[adIdx];
  return (
    <div style={{ position:'relative', height:'100%', display:'flex', flexDirection:'column', overflow:'hidden', background:'#0c0c0c' }}>
      {/* Background video — drop bg-video.mp4 into the project folder to activate */}
      <video autoPlay muted loop playsInline
        style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', zIndex:0 }}
        onError={e => e.target.style.display='none'}>
        <source src="bg-video.mp4" type="video/mp4"/>
      </video>
      {/* Animated gradient overlay — always on, dims video when present */}
      <div style={{ position:'absolute', inset:0, zIndex:1, background:'linear-gradient(135deg,rgba(12,12,12,0.94) 0%,rgba(26,18,0,0.88) 50%,rgba(12,12,12,0.94) 100%)', backgroundSize:'300% 300%', animation:'bgpulse 14s ease-in-out infinite' }}/>
      <div style={{ position:'absolute', inset:0, zIndex:2, background:'radial-gradient(ellipse at 50% 22%,rgba(184,145,31,0.14) 0%,transparent 65%)', animation:'glowpulse 6s ease-in-out infinite' }}/>

      {/* Scrollable content */}
      <div style={{ position:'relative', zIndex:3, flex:1, overflowY:'auto', display:'flex', flexDirection:'column', alignItems:'center', padding:'52px 28px 48px' }}>

        {/* Logo + Company Name */}
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', marginBottom:26 }}>
          <div style={{ width:90, height:90, borderRadius:26, border:`2px solid ${G}`, overflow:'hidden', marginBottom:16, boxShadow:`0 0 40px ${G}66, 0 8px 32px rgba(0,0,0,0.7)` }}>
            <img src="logo.jpg" alt="Onyxhawk logo" style={{ width:'100%', height:'100%', objectFit:'cover' }}/>
          </div>
          <div style={{ fontSize:36, fontWeight:900, color:'#fff', letterSpacing:-1, textShadow:'0 2px 24px rgba(0,0,0,0.9)' }}>
            Onyx<span style={{ color:G }}>hawk</span>
          </div>
          <div style={{ fontSize:10, color:'rgba(255,255,255,0.52)', letterSpacing:3.5, textTransform:'uppercase', marginTop:6 }}>
            Cleaning Service · Nairobi
          </div>
        </div>

        {/* Vision / Description */}
        <div style={{ textAlign:'center', marginBottom:28 }}>
          <h1 style={{ fontSize:22, fontWeight:800, color:'#fff', lineHeight:1.38, marginBottom:12, textShadow:'0 2px 16px rgba(0,0,0,0.8)' }}>
            Spotless Spaces.<br/><span style={{ color:G }}>Every Time.</span>

        </div>

        <div style={{ width:'100%', maxWidth:340, background:'rgba(201,162,39,0.13)', border:'1px solid rgba(201,162,39,0.38)', borderRadius:14, padding:'13px 15px', marginBottom:10, display:'flex', alignItems:'center', gap:12 }}>

/* ─── SIGN IN ─── */
function SignIn({ go, onAuth }) {
  const [cred, setCred] = React.useState('');
  const [pass, setPass] = React.useState('');
  const inp = { display:'block', width:'100%', padding:'13px 15px', marginBottom:10, background:CARD2, border:`1px solid ${BO}`, borderRadius:12, color:TX, fontSize:14, outline:'none', fontFamily:'inherit' };
  const handleSignIn = () => {
    let existing;
    try { existing = JSON.parse(localStorage.getItem('onyxhawk_user')); } catch {}
    onAuth(existing || { name: cred || 'Member', phone: cred, email:'', points:0, totalEarned:0, history:[] });
    go('home');
  };
  return (
    <div style={{ padding:'48px 28px 40px', display:'flex', flexDirection:'column', alignItems:'center', minHeight:'100%' }}>
      <button onClick={() => go('landing')} style={{ alignSelf:'flex-start', background:'none', border:'none', color:MU, cursor:'pointer', fontSize:13, marginBottom:24, fontFamily:'inherit' }}>← Back</button>
      <img src="logo.jpg" alt="Onyxhawk" style={{ width:66, height:66, borderRadius:18, objectFit:'cover', marginBottom:18, border:`1px solid ${G}` }}/>
      <h2 style={{ fontSize:26, fontWeight:800, color:TX, marginBottom:6, letterSpacing:-0.5 }}>Welcome Back</h2>
      <p style={{ fontSize:13, color:MU, marginBottom:30, textAlign:'center' }}>Sign in to manage your bookings</p>
      <div style={{ width:'100%', maxWidth:340 }}>
        <input placeholder="Phone or Email" value={cred} onChange={e=>setCred(e.target.value)} style={inp}/>
        <input type="password" placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} style={inp}/>
        <div style={{ textAlign:'right', marginBottom:22 }}>
          <span style={{ fontSize:12, color:G, cursor:'pointer' }}>Forgot password?</span>
        </div>
        <button className="ox-btn" onClick={handleSignIn}
          style={{ width:'100%', padding:'15px', background:G, borderRadius:12, color:'#000', fontSize:15, fontWeight:800, fontFamily:'inherit' }}>
          Sign In
        </button>
        <p style={{ textAlign:'center', marginTop:20, fontSize:13, color:MU }}>
          Don't have an account?{' '}
          <span onClick={() => go('signup')} style={{ color:G, fontWeight:700, cursor:'pointer' }}>Sign Up</span>
        </p>
      </div>
    </div>
  );
}

/* ─── SIGN UP ─── */
function SignUp({ go, onAuth }) {
  const [name, setName] = React.useState('');
  const [phone, setPhone] = React.useState('');
  const [pass, setPass] = React.useState('');
  const inp = { display:'block', width:'100%', padding:'13px 15px', marginBottom:10, background:CARD2, border:`1px solid ${BO}`, borderRadius:12, color:TX, fontSize:14, outline:'none', fontFamily:'inherit' };
  const handleSignUp = () => {
    onAuth({ name: name || 'Member', phone, email:'', points:0, totalEarned:0, history:[] });
    go('home');
  };
  return (
    <div style={{ padding:'48px 28px 40px', display:'flex', flexDirection:'column', alignItems:'center', minHeight:'100%' }}>
      <button onClick={() => go('landing')} style={{ alignSelf:'flex-start', background:'none', border:'none', color:MU, cursor:'pointer', fontSize:13, marginBottom:24, fontFamily:'inherit' }}>← Back</button>
      <img src="logo.jpg" alt="Onyxhawk" style={{ width:66, height:66, borderRadius:18, objectFit:'cover', marginBottom:18, border:`1px solid ${G}` }}/>
      <h2 style={{ fontSize:26, fontWeight:800, color:TX, marginBottom:6, letterSpacing:-0.5 }}>Create Account</h2>
      <p style={{ fontSize:13, color:MU, marginBottom:6, textAlign:'center' }}>Book, track, and manage your cleans</p>
      <div style={{ background:`${G}18`, border:`1px solid ${G}44`, borderRadius:10, padding:'10px 14px', marginBottom:22, textAlign:'center' }}>
        <span style={{ fontSize:12, color:G, fontWeight:600 }}>⭐ Earn loyalty points on every booking!</span>
      </div>
      <div style={{ width:'100%', maxWidth:340 }}>
        <input placeholder="Full Name" value={name} onChange={e=>setName(e.target.value)} style={inp}/>
        <input placeholder="Phone Number" type="tel" value={phone} onChange={e=>setPhone(e.target.value)} style={inp}/>

        <button className="ox-btn" onClick={handleSignUp}
          style={{ width:'100%', padding:'15px', background:G, borderRadius:12, color:'#000', fontSize:15, fontWeight:800, fontFamily:'inherit' }}>

        <p style={{ textAlign:'center', marginTop:20, fontSize:13, color:MU }}>

        </p>
      </div>

/* ─── BECOME A CLEANER ─── */

/* ─── REWARDS SCREEN ─── */

      <button className="ox-btn" onClick={() => go('signin')}
        style={{ width:'100%', padding:'14px', background:'transparent', border:`1px solid ${BO}`, borderRadius:12, color:TX, fontSize:14, fontFamily:'inherit' }}>
        Sign In
      </button>
    </div>
  );

  const pts = user.points || 0;

  const redeem = (r) => {
    if (pts < r.pts) return;
    const now = new Date().toISOString().split('T')[0];
    saveUser({
      ...user,
      points: pts - r.pts,
      history: [{ date: now, service: r.label, points: -r.pts, type:'redeem' }, ...(user.history || [])],
    });
    setRedeemed(r.id);
    setTimeout(() => setRedeemed(null), 2500);
  };

  return (
    <div style={{ padding:'22px 22px 36px' }}>

      {/* Balance card */}
      <div style={{ background:'linear-gradient(135deg,#1a1200,#2a1e00)', border:`1px solid ${GD}`, borderRadius:18, padding:'22px', marginBottom:22, textAlign:'center', position:'relative', overflow:'hidden' }}>
        <div style={{ position:'absolute', top:-24, right:-24, width:110, height:110, borderRadius:'50%', background:`${G}18` }}/>
        <div style={{ fontSize:9, color:G, letterSpacing:2, textTransform:'uppercase', marginBottom:8 }}>Your Points Balance</div>
        <div style={{ fontSize:56, fontWeight:900, color:G, lineHeight:1, marginBottom:6 }}>{pts.toLocaleString()}</div>
        <div style={{ fontSize:12, color:MU, marginBottom:4 }}>Total earned: {(user.totalEarned||0).toLocaleString()} pts</div>
        <div style={{ fontSize:13, color:TX, fontWeight:600 }}>👤 {user.name}</div>
      </div>

      {/* Earn rates */}
      <div style={{ fontSize:13, fontWeight:700, color:TX, marginBottom:10 }}>Earn Points Per Booking</div>
      <div style={{ background:CARD, border:`1px solid ${BO}`, borderRadius:14, marginBottom:22, overflow:'hidden' }}>
        {SVCS.map((s, i) => (
          <div key={s.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'11px 14px', borderBottom: i<SVCS.length-1 ? `1px solid ${BO}` : 'none' }}>
            <span style={{ fontSize:16, flexShrink:0 }}>{s.ic}</span>
            <span style={{ flex:1, fontSize:12, color:TX }}>{s.name}</span>
            <span style={{ fontSize:12, fontWeight:700, color:G }}>+{SVC_POINTS[s.id].toLocaleString()} pts</span>
          </div>
        ))}
      </div>

      {/* Redeem */}
      <div style={{ fontSize:13, fontWeight:700, color:TX, marginBottom:10 }}>Redeem Rewards</div>
      <div style={{ display:'flex', flexDirection:'column', gap:10, marginBottom:24 }}>
        {REWARDS.map(r => {
          const ok = pts >= r.pts;
          const done = redeemed === r.id;
          return (
            <div key={r.id} style={{ background:CARD, border:`1px solid ${ok ? G : BO}`, borderRadius:14, padding:'14px 15px', display:'flex', alignItems:'center', gap:12, opacity: ok ? 1 : 0.55 }}>
              <div style={{ fontSize:22, flexShrink:0 }}>{r.ic}</div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:13, fontWeight:700, color:TX }}>{r.label}</div>
                <div style={{ fontSize:11, color:MU, marginTop:2 }}>{r.desc}</div>
                <div style={{ fontSize:11, color:G, marginTop:3, fontWeight:600 }}>{r.pts.toLocaleString()} pts</div>
              </div>
              <button className="ox-btn" onClick={() => redeem(r)} disabled={!ok}
                style={{ padding:'8px 11px', background: done ? OK : ok ? G : CARD2, border:`1px solid ${done ? OK : ok ? G : BO}`, borderRadius:9, color: done ? '#fff' : ok ? '#000' : MU, fontSize:10, fontWeight:700, flexShrink:0, cursor: ok ? 'pointer' : 'not-allowed', fontFamily:'inherit', minWidth:76, textAlign:'center' }}>
                {done ? '✓ Done!' : ok ? 'Redeem' : `${(r.pts-pts).toLocaleString()} more`}
              </button>
            </div>
          );
        })}
      </div>

      {/* History */}
      {(user.history||[]).length > 0 && (
        <>
          <div style={{ fontSize:13, fontWeight:700, color:TX, marginBottom:10 }}>Points History</div>
          <div style={{ background:CARD, border:`1px solid ${BO}`, borderRadius:14, overflow:'hidden', marginBottom:8 }}>
            {(user.history||[]).slice(0,8).map((h, i, arr) => (
              <div key={i} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'11px 15px', borderBottom: i<arr.length-1 ? `1px solid ${BO}` : 'none' }}>
                <div>
                  <div style={{ fontSize:12, color:TX, fontWeight:500 }}>{h.service}</div>
                  <div style={{ fontSize:10, color:MU, marginTop:2 }}>{h.date}</div>
                </div>
                <div style={{ fontSize:13, fontWeight:700, color: h.type==='earn' ? OK : '#e24b4a' }}>
                  {h.type==='earn' ? '+' : ''}{h.points.toLocaleString()} pts
                </div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

/* ─── PAYMENTS SCREEN ─── */
function Payments({ bookings, saveBookings, go }) {
  const [activeId,  setActiveId]  = React.useState(null);
  const [stkPhone,  setStkPhone]  = React.useState('');
  const [stkState,  setStkState]  = React.useState('idle');
  const [stkCid,    setStkCid]    = React.useState('');
  const [stkError,  setStkError]  = React.useState('');

  const fmtPhone = (p) => {
    let n = (p||'').replace(/[\s\-()]/g,'');
    if (n.startsWith('+254')) n = n.slice(1);
    else if (n.startsWith('0')) n = '254'+n.slice(1);
    else if (!n.startsWith('254')) n = '254'+n;
    return n;
  };

  const openPay = (b) => {
    setActiveId(b.id); setStkState('idle');
    setStkPhone(b.phone||''); setStkError(''); setStkCid(b.checkoutId||'');
  };

  const pay = async (b) => {
    const phone = fmtPhone(stkPhone||b.phone||'');
    if (!phone||phone.length<12) { setStkError('Enter a valid Safaricom number'); return; }
    setStkState('sending'); setStkError('');
    try {
      const res  = await fetch(`${CONFIG.darajaApi}/api/stkpush`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone,amount:b.amount,accountRef:`OHK-${(b.name||'BOOK').split(' ')[0].toUpperCase().slice(0,8)}`})});
      const data = await res.json();
      if (data.ResponseCode==='0') {
        setStkCid(data.CheckoutRequestID); setStkState('sent');
        saveBookings(bookings.map(x=>x.id===b.id?{...x,checkoutId:data.CheckoutRequestID}:x));
      } else { setStkState('error'); setStkError(data.errorMessage||'STK push failed'); }
    } catch { setStkState('error'); setStkError('Cannot reach payment server'); }
  };

  const verify = async (b) => {
    const cid = stkCid||b.checkoutId;
    if (!cid) return;
    setStkState('checking');
    try {
      const res  = await fetch(`${CONFIG.darajaApi}/api/stkquery`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({checkoutRequestId:cid})});
      const data = await res.json();
      if (data.ResultCode==='0'||data.ResultCode===0) {
        setStkState('paid');
        saveBookings(bookings.map(x=>x.id===b.id?{...x,status:'paid',paidAt:new Date().toISOString().slice(0,10)}:x));
      } else if (data.ResultCode!==undefined) { setStkState('error'); setStkError(data.ResultDesc||'Not confirmed'); }
      else setStkState('sent');
    } catch { setStkState('sent'); }
  };

  const pending = bookings.filter(b=>b.status==='pending');
  const paid    = bookings.filter(b=>b.status==='paid');

  if (!bookings.length) return (
    <div style={{padding:'64px 24px',textAlign:'center'}}>
      <div style={{fontSize:52,marginBottom:16}}>💳</div>
      <h2 style={{fontSize:22,fontWeight:800,color:TX,marginBottom:10}}>No Payments Yet</h2>
      <p style={{fontSize:13,color:MU,lineHeight:1.75,marginBottom:28}}>Your payment history will appear here once you book a service.</p>
      <button className="ox-btn" onClick={()=>go('book')} style={{padding:'13px 28px',background:G,borderRadius:12,color:'#000',fontSize:14,fontWeight:700}}>Book a Service →</button>
    </div>
  );

  return (
    <div style={{padding:'24px 22px 48px'}}>
      <div style={{fontSize:9,color:G,letterSpacing:2,textTransform:'uppercase',marginBottom:4}}>Transactions</div>
      <h2 style={{fontSize:24,fontWeight:800,color:TX,marginBottom:20,letterSpacing:-0.3}}>Payments</h2>

      {pending.length>0 && (
        <>
          <div style={{fontSize:11,color:MU,textTransform:'uppercase',letterSpacing:1,marginBottom:10}}>Pending</div>
          {pending.map(b=>(
            <div key={b.id} style={{background:CARD,border:`1px solid #e24b4a44`,borderRadius:14,padding:'14px',marginBottom:10}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                <span style={{fontSize:22}}>{SVCS.find(s=>s.id===b.serviceId)?.ic||'🧹'}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,color:TX}}>{b.service}</div>
                  <div style={{fontSize:11,color:MU}}>{b.date} · {b.time}</div>
                </div>
                <div style={{fontSize:14,fontWeight:800,color:G}}>KES {formatKES(b.amount)}</div>
              </div>
              <div style={{fontSize:11,color:'#e24b4a',marginBottom:10,display:'flex',alignItems:'center',gap:5}}>
                <span style={{width:6,height:6,borderRadius:'50%',background:'#e24b4a',display:'inline-block'}}/>
                Awaiting payment
              </div>
              {activeId===b.id ? (
                stkState==='paid' ? (
                  <div style={{textAlign:'center',padding:'10px 0'}}>
                    <div style={{fontSize:28,marginBottom:4}}>✅</div>
                    <div style={{fontSize:13,fontWeight:700,color:OK}}>Payment Confirmed!</div>
                  </div>
                ) : (stkState==='sent'||stkState==='checking') ? (
                  <div>
                    <div style={{background:`${OK}12`,border:`1px solid ${OK}44`,borderRadius:9,padding:'10px',marginBottom:8,textAlign:'center'}}>
                      <div style={{fontSize:12,fontWeight:700,color:OK}}>📲 Prompt sent — enter your M-Pesa PIN</div>
                    </div>
                    <button className="ox-btn" onClick={()=>verify(b)} disabled={stkState==='checking'}
                      style={{width:'100%',padding:'11px',background:stkState==='checking'?CARD2:G,borderRadius:9,color:stkState==='checking'?MU:'#000',fontSize:12,fontWeight:700,cursor:stkState==='checking'?'not-allowed':'pointer',marginBottom:5}}>
                      {stkState==='checking'?'Verifying...':"I've Paid — Verify"}
                    </button>
                    <button onClick={()=>{setStkState('idle');setActiveId(null);}} style={{width:'100%',padding:'7px',background:'none',border:'none',color:MU,fontSize:11,cursor:'pointer',fontFamily:'inherit'}}>Cancel</button>
                  </div>
                ) : (
                  <div>
                    <input type="tel" placeholder={`Safaricom number (e.g. ${b.phone||'0712 345 678'})`}
                      value={stkPhone} onChange={e=>{setStkPhone(e.target.value);setStkError('');}}
                      style={{display:'block',width:'100%',padding:'10px 12px',marginBottom:stkError?3:7,background:CARD2,border:`1px solid ${stkError?'#e24b4a':BO}`,borderRadius:8,color:TX,fontSize:12,outline:'none',fontFamily:'inherit'}}/>
                    {stkError&&<div style={{fontSize:10,color:'#e24b4a',marginBottom:6}}>{stkError}</div>}
                    <button className="ox-btn" onClick={()=>pay(b)} disabled={stkState==='sending'}
                      style={{width:'100%',padding:'11px',background:stkState==='sending'?GD:G,borderRadius:9,color:'#000',fontSize:12,fontWeight:700,cursor:stkState==='sending'?'not-allowed':'pointer',marginBottom:5}}>
                      {stkState==='sending'?'Sending...':`Pay KES ${formatKES(b.amount)} — STK Push`}
                    </button>
                    <button onClick={()=>{setActiveId(null);setStkState('idle');setStkError('');}} style={{width:'100%',padding:'7px',background:'none',border:'none',color:MU,fontSize:11,cursor:'pointer',fontFamily:'inherit'}}>Cancel</button>
                  </div>
                )
              ) : (
                <button className="ox-btn" onClick={()=>openPay(b)}
                  style={{width:'100%',padding:'11px',background:G,borderRadius:9,color:'#000',fontSize:12,fontWeight:700,cursor:'pointer'}}>
                  Pay Now →
                </button>
              )}
            </div>
          ))}
        </>
      )}

      {paid.length>0 && (
        <>
          <div style={{fontSize:11,color:MU,textTransform:'uppercase',letterSpacing:1,marginBottom:10,marginTop:pending.length?16:0}}>Payment History</div>
          <div style={{background:CARD,border:`1px solid ${BO}`,borderRadius:14,overflow:'hidden'}}>
            {paid.map((b,i)=>(
              <div key={b.id} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',borderBottom:i<paid.length-1?`1px solid ${BO}`:'none'}}>
                <div style={{width:34,height:34,borderRadius:17,background:`${OK}18`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0}}>✅</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:600,color:TX}}>{b.service}</div>
                  <div style={{fontSize:10,color:MU}}>{b.paidAt||b.date}</div>
                </div>
                <div style={{fontSize:13,fontWeight:700,color:OK}}>KES {formatKES(b.amount)}</div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

/* ─── Main App ─── */
function App() {
  const [screen, setScreen]   = useState('landing');
  const [selSvc, setSelSvc]   = useState(null);
  const [form,   setForm]     = useState({ name:'', phone:'', email:'', date:'', time:'', location:'', notes:'' });
  const [errs,   setErrs]     = useState({});
  const [msgs,   setMsgs]     = useState([
    { r:'ai', t:"Hi! I'm Hawk AI — your Onyxhawk assistant. Ask me about services, pricing, or book a clean!" }
  ]);
  const [inp,     setInp]     = useState('');
  const [aiLoad,  setAiLoad]  = useState(false);
  const [user,    setUser]    = useState(() => { try { return JSON.parse(localStorage.getItem('onyxhawk_user')) || null; } catch { return null; } });
  const [lastPts, setLastPts] = useState(0);
  const [copied,  setCopied]  = useState(false);
  const [stkState,      setStkState]      = useState('idle'); // idle | sending | sent | checking | success | error
  const [stkCheckoutId, setStkCheckoutId] = useState('');
  const [stkPhone,      setStkPhone]      = useState('');
  const [stkError,      setStkError]      = useState('');
  const [bookings,      setBookings]      = useState(() => { try { return JSON.parse(localStorage.getItem('onyxhawk_bookings'))||[]; } catch { return []; } });
  const [currentBid,    setCurrentBid]    = useState(null);

  const saveBookings = (bs) => { setBookings(bs); localStorage.setItem('onyxhawk_bookings', JSON.stringify(bs)); };
  const [theme,   setThemeRaw] = useState(() => {
    const saved = localStorage.getItem('onyxhawk_theme') || 'dark';
    if (saved === 'light') document.body.classList.add('light-mode');
    return saved;
  });
  const chatEnd  = useRef(null);
  const contentRef = useRef(null);

  const setTheme = (t) => {
    setThemeRaw(t);
    localStorage.setItem('onyxhawk_theme', t);
    document.body.classList.toggle('light-mode', t === 'light');
  };

  const saveUser = (u) => {
    setUser(u);
    if (u) localStorage.setItem('onyxhawk_user', JSON.stringify(u));
    else localStorage.removeItem('onyxhawk_user');
  };

  useEffect(() => { chatEnd.current?.scrollIntoView({ behavior:'smooth' }); }, [msgs, aiLoad]);

  const go = (s) => {
    setScreen(s);
    if (s !== 'chat') setTimeout(() => contentRef.current?.scrollTo(0, 0), 50);
  };

  const bookSvc = (svc) => { setSelSvc(svc); go('book'); };

  const upd = (key, val) => {
    setForm(p => ({ ...p, [key]:val }));
    setErrs(p => ({ ...p, [key]:false }));
  };

  const validate = () => {
    const e = {};
    if (!form.name.trim())     e.name     = 1;
    if (!form.phone.trim())    e.phone    = 1;
    if (!form.date)            e.date     = 1;
    if (!form.time)            e.time     = 1;
    if (!form.location.trim()) e.location = 1;
    setErrs(e);
    return !Object.keys(e).length;
  };

  const goToReview = () => {
    if (!selSvc || !validate()) return;
    go('review');
  };

  const submit = () => {
    if (!selSvc || !validate()) return;
    const bid = Date.now();
    setCurrentBid(bid);
    saveBookings([{ id:bid, service:selSvc.name, serviceId:selSvc.id, amount:selSvc.priceKES, name:form.name, phone:form.phone, date:form.date, time:form.time, location:form.location, notes:form.notes, status:'pending', bookedAt:new Date().toISOString().slice(0,10), paidAt:null, checkoutId:null }, ...bookings]);
    if (user) {
      const pts = SVC_POINTS[selSvc.id] || 100;
      const now = new Date().toISOString().split('T')[0];
      saveUser({
        ...user,
        points: (user.points || 0) + pts,
        totalEarned: (user.totalEarned || 0) + pts,
        history: [{ date: now, service: selSvc.name, points: pts, type: 'earn' }, ...(user.history || [])],
      });
      setLastPts(pts);
    }
    setStkState('idle');
    setStkCheckoutId('');
    setStkPhone(form.phone || user?.phone || '');
    setStkError('');
    go('confirm');
  };

  const mpesaAmount = selSvc?.priceKES || 0;
  const mpesaAccount = user?.phone || form.phone || 'Customer';
  const mpesaText = `Paybill: ${CONFIG.mpesaPaybill}\nAccount: ${mpesaAccount}\nAmount: KES ${formatKES(mpesaAmount)}\nService: ${selSvc?.name || CONFIG.mpesaBusiness}`;
  const mpesaDial = `tel:${encodeURIComponent('*334#')}`;

  const copyMpesaDetails = async () => {
    try {
      await navigator.clipboard.writeText(mpesaText);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch (e) {
      window.prompt('Copy these M-Pesa details:', mpesaText);
    }
  };

  const formatDarajaPhone = (p) => {
    let n = (p || '').replace(/[\s\-()]/g, '');
    if (n.startsWith('+254')) n = n.slice(1);
    else if (n.startsWith('0')) n = '254' + n.slice(1);
    else if (!n.startsWith('254')) n = '254' + n;
    return n;
  };

  const initiateStkPush = async () => {
    const phone = formatDarajaPhone(stkPhone || form.phone || user?.phone || '');
    if (!phone || phone.length < 12) { setStkError('Enter a valid Safaricom number'); return; }
    setStkState('sending'); setStkError('');
    try {
      const res = await fetch(`${CONFIG.darajaApi}/api/stkpush`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          phone,
          amount: selSvc?.priceKES || 1,
          accountRef: `OHK-${(form.name || 'BOOK').split(' ')[0].toUpperCase().slice(0, 8)}`,
        }),
      });
      const data = await res.json();
      if (data.ResponseCode === '0') {
        setStkCheckoutId(data.CheckoutRequestID);
        setStkState('sent');
        if (currentBid) saveBookings(bookings.map(b => b.id===currentBid ? {...b, checkoutId:data.CheckoutRequestID} : b));
      } else {
        setStkState('error');
        setStkError(data.errorMessage || data.ResponseDescription || 'STK push failed. Try again.');
      }
    } catch {
      setStkState('error');
      setStkError('Cannot reach the payment server. Make sure server.js is running.');
    }
  };

  const queryStkStatus = async () => {
    if (!stkCheckoutId) return;
    setStkState('checking');
    try {
      const res = await fetch(`${CONFIG.darajaApi}/api/stkquery`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ checkoutRequestId: stkCheckoutId }),
      });
      const data = await res.json();
      if (data.ResultCode === '0' || data.ResultCode === 0) {
        setStkState('success');
        if (currentBid) saveBookings(bookings.map(b => b.id===currentBid ? {...b, status:'paid', paidAt:new Date().toISOString().slice(0,10)} : b));
      } else if (data.ResultCode !== undefined) {
        setStkState('error');
        setStkError(data.ResultDesc || 'Payment not confirmed. Check and retry.');

          <div>
            <div style={{ fontSize:14, fontWeight:700, color:OK }}>+{lastPts.toLocaleString()} Points Earned!</div>
            <div style={{ fontSize:11, color:MU, marginTop:2 }}>Balance: {(user.points||0).toLocaleString()} pts — check the Rewards tab</div>
          </div>
        </div>
      )}

      <div style={{ background:CARD, border:`1px solid ${BO}`, borderRadius:14, padding:'16px', marginBottom:16 }}>
        <div style={{ fontSize:11, color:G, letterSpacing:2, textTransform:'uppercase', marginBottom:12 }}>Pay with M-Pesa</div>

        {/* ── STK Push ── */}
        {stkState === 'success' ? (
          <div style={{ textAlign:'center', padding:'10px 0 8px' }}>
            <div style={{ fontSize:36, marginBottom:8 }}>✅</div>
            <div style={{ fontSize:15, fontWeight:700, color:OK }}>Payment Confirmed!</div>
            <div style={{ fontSize:12, color:MU, marginTop:4 }}>KES {formatKES(mpesaAmount)} received. Thank you!</div>
          </div>
        ) : (stkState === 'sent' || stkState === 'checking') ? (
          <div>
            <div style={{ background:`${OK}12`, border:`1px solid ${OK}44`, borderRadius:10, padding:'12px', marginBottom:10, textAlign:'center' }}>
              <div style={{ fontSize:14, fontWeight:700, color:OK }}>📲 Prompt sent!</div>
              <div style={{ fontSize:12, color:TX, marginTop:4 }}>Enter your M-Pesa PIN to complete payment</div>
              <div style={{ fontSize:11, color:MU, marginTop:3 }}>{formatDarajaPhone(stkPhone || form.phone)}</div>
            </div>
            <button className="ox-btn" onClick={queryStkStatus} disabled={stkState === 'checking'}
              style={{ width:'100%', padding:'12px', background:stkState==='checking'?CARD2:G, borderRadius:10, color:stkState==='checking'?MU:'#000', fontSize:13, fontWeight:700, cursor:stkState==='checking'?'not-allowed':'pointer', marginBottom:6 }}>
              {stkState === 'checking' ? 'Verifying...' : "I've Paid — Verify"}
            </button>
            <button onClick={() => setStkState('idle')}
              style={{ width:'100%', padding:'8px', background:'none', border:'none', color:MU, fontSize:12, cursor:'pointer', fontFamily:'inherit' }}>
              Resend / Change number
            </button>
          </div>
        ) : (
          <div>
            <div style={{ fontSize:12, color:MU, marginBottom:8 }}>Send a payment prompt to your Safaricom number:</div>
            <input type="tel" placeholder="e.g. 0712 345 678"
              value={stkPhone} onChange={e => { setStkPhone(e.target.value); setStkError(''); }}
              style={{ display:'block', width:'100%', padding:'11px 13px', marginBottom: stkError ? 4 : 8, background:CARD2, border:`1px solid ${stkError?'#e24b4a':BO}`, borderRadius:9, color:TX, fontSize:13, outline:'none', fontFamily:'inherit' }}/>
            {stkError && <div style={{ fontSize:11, color:'#e24b4a', marginBottom:8 }}>{stkError}</div>}
            <button className="ox-btn" onClick={initiateStkPush} disabled={stkState === 'sending'}
              style={{ width:'100%', padding:'13px', background:stkState==='sending'?GD:G, borderRadius:10, color:'#000', fontSize:13, fontWeight:700, cursor:stkState==='sending'?'not-allowed':'pointer' }}>
              {stkState === 'sending' ? 'Sending...' : `Pay KES ${formatKES(mpesaAmount)} — STK Push`}
            </button>
          </div>
        )}

        {/* ── Manual Paybill fallback ── */}
        {stkState !== 'success' && (
          <div style={{ marginTop:12, paddingTop:12, borderTop:`1px solid ${BO}` }}>
            <div style={{ fontSize:10, color:MU, letterSpacing:1, marginBottom:8 }}>OR PAY MANUALLY (PAYBILL):</div>
            <div style={{ display:'grid', gap:5, marginBottom:10 }}>
              <div style={{ fontSize:12, color:TX }}>Paybill: <strong>{CONFIG.mpesaPaybill}</strong></div>
              <div style={{ fontSize:12, color:TX }}>Account: <strong>{mpesaAccount}</strong></div>
              <div style={{ fontSize:12, color:TX }}>Amount: <strong>KES {formatKES(mpesaAmount)}</strong></div>
            </div>
            <div style={{ display:'flex', gap:8 }}>
              <a href={mpesaDial} style={{ flex:1, textAlign:'center', textDecoration:'none', padding:'10px', background:'transparent', border:`1px solid ${BO}`, borderRadius:9, color:TX, fontSize:12, fontWeight:600 }}>
                Open M-Pesa
              </a>
              <button className="ox-btn" onClick={copyMpesaDetails}
                style={{ flex:1, padding:'10px', background:'transparent', border:`1px solid ${BO}`, borderRadius:9, color:TX, fontSize:12, fontWeight:600, cursor:'pointer' }}>
                {copied ? 'Copied!' : 'Copy Details'}
              </button>
            </div>
          </div>
        )}
      </div>
      <a href={`https://wa.me/${CONFIG.whatsapp}?text=Hi%20Onyxhawk%2C%20I%20just%20booked%20${encodeURIComponent(selSvc?.name||'')}%20for%20${encodeURIComponent(form.date)}%20at%20${encodeURIComponent(form.time)}.%20My%20name%20is%20${encodeURIComponent(form.name)}.`}
        target="_blank" rel="noopener" style={{ display:'block', width:'100%', padding:'14px', background:'#25d366', borderRadius:12, color:'#fff', fontSize:14, fontWeight:700, textDecoration:'none', marginBottom:10 }}>
        💬 Confirm on WhatsApp
      </a>
      <button className="ox-btn" onClick={() => { go('home'); setForm({name:'',phone:'',email:'',date:'',time:'',location:'',notes:''}); setSelSvc(null); setErrs({}); setStkState('idle'); setStkCheckoutId(''); setStkPhone(''); setStkError(''); }}
        style={{ width:'100%', padding:'14px', background:'transparent', border:`1px solid ${BO}`, borderRadius:12, color:TX, fontSize:14, cursor:'pointer' }}>
        Back to Home
      </button>
      </div>
    </div>
  );

  /* ─── NAV ─── */
  const NAV = [
    { id:'home',     ic:'🏠', lb:'Home'    },
    { id:'book',     ic:'📅', lb:'Book'    },
    { id:'payments', ic:'💳', lb:'Pay'     },
    { id:'chat',     ic:'🤖', lb:'Hawk AI' },
    { id:'rewards',  ic:'⭐', lb:'Rewards' },
    { id:'account',  ic:'👤', lb:'Account' },
  ];

  const isChat = screen === 'chat';
  const contentCls = 'content' + (isChat ? ' chat-mode' : '');

  return (
    <>
      <div className={contentCls} ref={contentRef}>
        {screen === 'landing'  && <Landing  go={go}/>}
        {screen === 'signin'   && <SignIn   go={go} onAuth={saveUser}/>}
        {screen === 'signup'   && <SignUp   go={go} onAuth={saveUser}/>}
        {screen === 'cleaner'  && <BecomeACleaner go={go}/>}
        {screen === 'rewards'  && <Rewards  user={user} saveUser={saveUser} go={go}/>}
        {screen === 'account'  && <Account  user={user} saveUser={saveUser} go={go} theme={theme} setTheme={setTheme}/>}
        {screen === 'home'     && <Home/>}
        {screen === 'services' && <Services/>}
        {screen === 'book'     && <Book/>}
        {screen === 'payments' && <Payments bookings={bookings} saveBookings={saveBookings} go={go}/>}
        {screen === 'review'   && <Review/>}
        {screen === 'chat'     && <Chat/>}
        {screen === 'confirm'  && <Confirm/>}
      </div>

      {!['confirm','review','landing','signin','signup','cleaner'].includes(screen) && (
        <nav className="bottom-nav">
          {NAV.map(({ id, ic, lb }) => {
            const active = screen === id;
            return (
              <button key={id} className="nav-btn" onClick={() => go(id)}
                style={{ color: active ? G : MU, fontWeight: active ? 700 : 400 }}>
                <span style={{ fontSize:24 }}>{ic}</span>
                <span>{lb}</span>
              </button>
            );
          })}
        </nav>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(r => console.log('SW registered:', r.scope))
      .catch(e => console.log('SW error:', e));
  });
}
</script>
</body>
</html>
